<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Unit Converter</title>
  <link rel="stylesheet" href="style.css">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f4f8fb;
  color: #333;
}

.app-container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  color: #007bff;
}

.categories {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
}

.category-btn {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #e3f2fd;
  color: #007bff;
  font-weight: bold;
}

.category-btn.active {
  background: #007bff;
  color: #fff;
}

.converter-section {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

input, select, button {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
}

#swap-btn {
  background: #f1f1f1;
  cursor: pointer;
}

.convert-btn-wrapper {
  width: 100%;
  text-align: center;
  margin-top: 12px;
}

.convert-btn {
  width: 100%;
  background: #007bff;
  color: white;
  font-weight: bold;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #f0f9ff;
  border-left: 5px solid #007bff;
  border-radius: 8px;
  font-size: 18px;
  font-weight: bold;
  color: #0056b3;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  text-align: center;
}

ul#history-list {
  list-style: none;
  padding: 0;
}

ul#history-list li {
  padding: 6px;
  margin: 4px 0;
  background: #f9f9f9;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

ul#history-list button {
  background: transparent;
  border: none;
  cursor: pointer;
  color: red;
  font-size: 18px;
}

.shortcuts {
  margin-top: 20px;
  padding: 15px;
  background: #fff8e1;
  border-left: 5px solid #ff9800;
  border-radius: 8px;
}

.hidden {
  display: none;
}

.install-wrapper {
  text-align: center;
  margin-top: 20px;
}

.install-btn {
  background: #28a745;
  color: white;
  font-size: 16px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.install-btn:hover {
  background: #218838;
}

  </style>
</head>
<body>
  <div class="app-container">
    <h1>⚡ Smart Unit Converter</h1>

    <!-- Category Buttons -->
    <div class="categories">
      <button class="category-btn active" data-category="length">Length</button>
      <button class="category-btn" data-category="weight">Weight</button>
      <button class="category-btn" data-category="temperature">Temperature</button>
      <button class="category-btn" data-category="area">Area</button>
      <button class="category-btn" data-category="volume">Volume</button>
      <button class="category-btn" data-category="time">Time</button>
    </div>

    <!-- Converter Section -->
    <div class="converter-section">
      <input type="number" id="value" placeholder="Enter value">
      <select id="unit-from"></select>
      <button id="swap-btn">⇆</button>
      <select id="unit-to"></select>
      
      <!-- Convert button on new line -->
      <div class="convert-btn-wrapper">
        <button class="convert-btn" id="convert-btn">Convert</button>
      </div>
      
      <!-- Results styled as card -->
      <div class="result" id="result">Result will appear here</div>
    </div>

    <!-- History -->
    <h2>History</h2>
    <ul id="history-list">
      <li>No conversion history yet</li>
    </ul>

    <!-- Shortcuts help -->
    <div id="shortcuts-panel" class="shortcuts hidden">
      <h3>⌨️ Keyboard Shortcuts</h3>
      <ul>
        <li><b>Enter</b> → Convert</li>
        <li><b>Ctrl + Shift + S</b> → Swap Units</li>
        <li><b>Ctrl + Shift + C</b> → Clear History</li>
        <li><b>?</b> → Show/Hide Shortcuts</li>
      </ul>
    </div>

    <!-- Install App Button -->
    <div class="install-wrapper">
      <button id="install-btn" class="install-btn hidden">📲 Install App</button>
    </div>
  </div>

  <!-- <script src="script.js"></script> -->
  <script>
    const conversionData = {
      length: {
        units: ["meters","kilometers","centimeters","millimeters","miles","yards","feet","inches"],
        factors: {
          meters: 1, kilometers: 0.001, centimeters: 100, millimeters: 1000,
          miles: 0.000621371, yards: 1.09361, feet: 3.28084, inches: 39.3701
        }
      },
      weight: {
        units: ["kilograms","grams","milligrams","pounds","ounces","tons"],
        factors: {
          kilograms: 1, grams: 1000, milligrams: 1000000,
          pounds: 2.20462, ounces: 35.274, tons: 0.00110231
        }
      },
      temperature: { units: ["celsius","fahrenheit","kelvin"] },
      area: {
        units: ["square meters","square kilometers","square miles","square feet","acres","hectares"],
        factors: {
          "square meters": 1, "square kilometers": 0.000001, "square miles": 0.000000386102,
          "square feet": 10.7639, acres: 0.000247105, hectares: 0.0001
        }
      },
      volume: {
        units: ["liters","milliliters","cubic meters","cubic feet","gallons","pints"],
        factors: {
          liters: 1, milliliters: 1000, "cubic meters": 0.001,
          "cubic feet": 0.0353147, gallons: 0.264172, pints: 2.11338
        }
      },
      time: {
        units: ["seconds","minutes","hours","days","weeks","months","years"],
        factors: {
          seconds: 1, minutes: 60, hours: 3600, days: 86400,
          weeks: 604800, months: 2628000, years: 31536000
        }
      }
    };

    const categoryButtons = document.querySelectorAll('.category-btn');
    const unitFromSelect = document.getElementById('unit-from');
    const unitToSelect = document.getElementById('unit-to');
    const valueInput = document.getElementById('value');
    const convertBtn = document.getElementById('convert-btn');
    const resultDiv = document.getElementById('result');
    const historyList = document.getElementById('history-list');
    const swapBtn = document.getElementById('swap-btn');
    const overlay = document.getElementById('overlay');

    let currentCategory = 'length';
    let conversionHistory = [];

    function initConverter() {
      categoryButtons.forEach(button => {
        button.addEventListener('click', () => {
          setCategory(button.getAttribute('data-category'));
          categoryButtons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
        });
      });

      convertBtn.addEventListener('click', performConversion);
      swapBtn.addEventListener('click', swapUnits);
      valueInput.addEventListener('input', performConversion);
      unitFromSelect.addEventListener('change', performConversion);
      unitToSelect.addEventListener('change', performConversion);

      document.addEventListener('keydown', (e) => {
        if (e.key === "Enter") { e.preventDefault(); performConversion(); }
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") { e.preventDefault(); clearHistory(); }
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "s") { e.preventDefault(); swapUnits(); }
        if (e.key === "?") { e.preventDefault(); toggleOverlay(); }
      });

      setCategory('length');
      const savedHistory = localStorage.getItem('conversionHistory');
      if (savedHistory) {
        conversionHistory = JSON.parse(savedHistory);
        updateHistoryDisplay();
      }
    }

    function setCategory(category) {
      currentCategory = category;
      unitFromSelect.innerHTML = '';
      unitToSelect.innerHTML = '';
      conversionData[category].units.forEach(unit => {
        unitFromSelect.add(new Option(unit, unit));
        unitToSelect.add(new Option(unit, unit));
      });
      if (conversionData[category].units.length > 1) unitToSelect.selectedIndex = 1;
      resultDiv.textContent = 'Result will appear here';
    }

    function performConversion() {
      const value = parseFloat(valueInput.value);
      if (isNaN(value)) { resultDiv.textContent = 'Please enter a valid number'; return; }
      const fromUnit = unitFromSelect.value;
      const toUnit = unitToSelect.value;
      if (fromUnit === toUnit) { resultDiv.textContent = `${value} ${fromUnit} = ${value} ${toUnit}`; return; }

      let result;
      if (currentCategory === 'temperature') {
        result = convertTemperature(value, fromUnit, toUnit);
      } else {
        const baseValue = value * conversionData[currentCategory].factors[fromUnit];
        result = baseValue / conversionData[currentCategory].factors[toUnit];
      }
      const formattedResult = new Intl.NumberFormat('en-US',{maximumFractionDigits:6}).format(result);
      resultDiv.innerHTML = `${value} ${fromUnit} = <strong>${formattedResult} ${toUnit}</strong>`;
      addToHistory(value, fromUnit, formattedResult, toUnit);
    }

    function convertTemperature(value, fromUnit, toUnit) {
      let celsius;
      switch (fromUnit) {
        case 'celsius': celsius = value; break;
        case 'fahrenheit': celsius = (value - 32) * 5/9; break;
        case 'kelvin': celsius = value - 273.15; break;
      }
      switch (toUnit) {
        case 'celsius': return celsius;
        case 'fahrenheit': return (celsius * 9/5) + 32;
        case 'kelvin': return celsius + 273.15;
      }
    }

    function swapUnits() {
      [unitFromSelect.value, unitToSelect.value] = [unitToSelect.value, unitFromSelect.value];
      performConversion();
    }

    function addToHistory(value, fromUnit, result, toUnit) {
      const conversion = {
        value, fromUnit, result, toUnit,
        category: currentCategory,
        timestamp: new Date().toLocaleString()
      };
      conversionHistory.unshift(conversion);
      if (conversionHistory.length > 10) conversionHistory.pop();
      localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
      updateHistoryDisplay();
    }

    function updateHistoryDisplay() {
      historyList.innerHTML = '';
      if (conversionHistory.length === 0) {
        historyList.innerHTML = '<li>No conversion history yet</li>';
        return;
      }
      conversionHistory.forEach((c,index) => {
        const li = document.createElement('li');
        const text = document.createElement('span');
        text.textContent = `${c.value} ${c.fromUnit} → ${c.result} ${c.toUnit}`;
        const delBtn = document.createElement('button');
        delBtn.textContent = '❌';
        delBtn.style.border = 'none';
        delBtn.style.background = 'transparent';
        delBtn.style.cursor = 'pointer';
        delBtn.onclick = () => {
          conversionHistory.splice(index,1);
          localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
          updateHistoryDisplay();
        };
        li.appendChild(text);
        li.appendChild(delBtn);
        historyList.appendChild(li);
      });
    }

    function clearHistory() {
      conversionHistory = [];
      localStorage.removeItem('conversionHistory');
      updateHistoryDisplay();
    }

    function toggleOverlay() {
      overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
    }

    window.addEventListener('DOMContentLoaded', initConverter);
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("✅ Service Worker Registered"))
        .catch(err => console.log("SW Fail:", err));
    }
  </script>
</body>
</html>
